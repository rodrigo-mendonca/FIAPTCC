table:
  name: clientes
  description: "Tabela principal para cadastro completo de clientes pessoa física e jurídica, contendo dados de contato, endereço e informações comerciais essenciais para gestão de relacionamento"
  primary_key: id_cliente
  business_area: crm
  created_at: "2025-01-01T00:00:00Z"
  columns:
    id_cliente:
      name: id_cliente
      type: integer
      description: "Identificador único do cliente, chave primária auto-incrementada utilizada como referência em outras tabelas"
      nullable: false
      searchable: true
      auto_increment: true
      primary_key: true
    nome_razao_social:
      name: nome_razao_social
      type: varchar
      description: "Nome completo para pessoa física ou razão social para pessoa jurídica, campo obrigatório para identificação"
      nullable: false
      searchable: true
      max_length: 200
    nome_fantasia:
      name: nome_fantasia
      type: varchar
      description: "Nome fantasia da empresa, utilizado apenas para pessoa jurídica, campo opcional para apresentação comercial"
      nullable: true
      searchable: true
      max_length: 150
    cpf_cnpj:
      name: cpf_cnpj
      type: varchar
      description: "CPF para pessoa física (11 dígitos) ou CNPJ para pessoa jurídica (14 dígitos), documento único de identificação"
      nullable: false
      searchable: true
      unique: true
      max_length: 18
    tipo_pessoa:
      name: tipo_pessoa
      type: char
      description: "Tipo de pessoa cadastrada: 'F' para pessoa física ou 'J' para pessoa jurídica"
      nullable: false
      searchable: true
      max_length: 1
      values:
        - F
        - J
    email:
      name: email
      type: varchar
      description: "Endereço de email principal do cliente para comunicação comercial e marketing"
      nullable: true
      searchable: true
      max_length: 100
    telefone:
      name: telefone
      type: varchar
      description: "Número de telefone principal do cliente incluindo DDD, usado para contato direto"
      nullable: true
      searchable: true
      max_length: 20
    endereco:
      name: endereco
      type: varchar
      description: "Endereço completo do cliente incluindo logradouro, número e complemento"
      nullable: true
      searchable: false
      max_length: 200
    cidade:
      name: cidade
      type: varchar
      description: "Nome da cidade onde o cliente está localizado, usado para relatórios regionais"
      nullable: true
      searchable: true
      max_length: 100
    estado:
      name: estado
      type: char
      description: "Sigla do estado ou unidade federativa do cliente (2 caracteres)"
      nullable: true
      searchable: true
      max_length: 2
    cep:
      name: cep
      type: varchar
      description: "Código de Endereçamento Postal do cliente, usado para cálculos de frete"
      nullable: true
      searchable: false
      max_length: 10
    limite_credito:
      name: limite_credito
      type: decimal
      description: "Valor máximo em reais que o cliente pode dever sem necessidade de aprovação especial"
      nullable: true
      searchable: false
      precision: 12
      scale: 2
      default: 0.00
    saldo_atual:
      name: saldo_atual
      type: decimal
      description: "Saldo atual da conta corrente do cliente: positivo indica crédito, negativo indica débito"
      nullable: true
      searchable: false
      precision: 12
      scale: 2
      default: 0.00
    data_cadastro:
      name: data_cadastro
      type: datetime
      description: "Data e hora do primeiro cadastro do cliente no sistema"
      nullable: false
      searchable: true
      default: "CURRENT_TIMESTAMP"
    ativo:
      name: ativo
      type: boolean
      description: "Indica se o cliente está ativo no sistema e pode realizar transações"
      nullable: false
      searchable: true
      default: true
  relationships:
    - type: one_to_many
      related_table: vendas
      foreign_key: id_cliente
      reference_key: id_cliente
      description: "Um cliente pode ter múltiplas vendas associadas"
    - type: one_to_many
      related_table: contas_receber
      foreign_key: id_cliente
      reference_key: id_cliente
      description: "Um cliente pode ter múltiplas contas a receber"
  indexes:
    - name: idx_cpf_cnpj
      columns:
        - cpf_cnpj
      unique: true
      description: "Índice único para garantir documento único"
    - name: idx_nome_razao_social
      columns:
        - nome_razao_social
      unique: false
      description: "Índice para busca rápida por nome"
    - name: idx_cidade_estado
      columns:
        - cidade
        - estado
      unique: false
      description: "Índice composto para relatórios regionais"
    - name: idx_ativo
      columns:
        - ativo
      unique: false
      description: "Índice para filtrar clientes ativos"
